name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Build
      id: build
      run: cargo build --release --verbose

    - name: Check formatting
      if: always() && steps.build.outcome == 'success'
      run: cargo fmt --check

    - name: Run Clippy
      if: always() && steps.build.outcome == 'success'
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run Rust tests
      if: always() && steps.build.outcome == 'success'
      run: cargo test --verbose

    - name: Run Aureum tests
      if: always() && steps.build.outcome == 'success'
      run: RELEASE=1 ./test_spec.sh test --verbose spec examples aureum-cli/assets
      shell: bash
