program = { env = "AUREUM_TEST_EXEC" }


[tests.summary_passing]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/passing_test.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
.

Test result: OK (1 passed, 0 failed)
"""
expected_stderr = ""
expected_exit_code = 0


[tests.summary_failing]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/failing_test.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
F

вқҢ helpers/failing_test.toml
в”ңв”Җв”Җ Standard output
в”Ӯ   в”ңв”Җв”Җ Expected
в”Ӯ   в”Ӯ   в•ӯ
в”Ӯ   в”Ӯ   в”Ӯ 1   в”Ӯ  STDOUT
в”Ӯ   в”Ӯ   в•°
в”Ӯ   в”ңв”Җв”Җ Got
в”Ӯ   в”Ӯ   в•ӯ
в”Ӯ   в”Ӯ   в”Ӯ   1 в”Ӯ  Hello world
в”Ӯ   в”Ӯ   в•°
в”Ӯ   в””в”Җв”Җ Diff
в”Ӯ       в•ӯ
в”Ӯ       в”Ӯ 1   в”Ӯ -STDOUT
в”Ӯ       в”Ӯ   1 в”Ӯ +Hello world
в”Ӯ       в•°
в”ңв”Җв”Җ Standard error
в”Ӯ   в”ңв”Җв”Җ Expected
в”Ӯ   в”Ӯ   в•ӯ
в”Ӯ   в”Ӯ   в”Ӯ 1   в”Ӯ  STDERR
в”Ӯ   в”Ӯ   в•°
в”Ӯ   в”ңв”Җв”Җ Got
в”Ӯ   в”Ӯ   в•ӯ
в”Ӯ   в”Ӯ   в”Ӯ   1 в”Ӯ
в”Ӯ   в”Ӯ   в•°
в”Ӯ   в””в”Җв”Җ Diff
в”Ӯ       в•ӯ
в”Ӯ       в”Ӯ 1   в”Ӯ -STDERR
в”Ӯ       в•°
в””в”Җв”Җ Exit code
    в”ңв”Җв”Җ Expected
    в”Ӯ   в””в”Җв”Җ 42
    в””в”Җв”Җ Got
        в””в”Җв”Җ 0

Test result: FAIL (0 passed, 1 failed)
