program = { env = "AUREUM_TEST_EXEC" }


[tests.summary_passing]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/passing_test.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
.

Test result: OK (1 passed, 0 failed)
"""
expected_stderr = ""
expected_exit_code = 0


[tests.summary_failing]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/failing_test.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
F

вңҳ helpers/failing_test.toml
в”ңв”Җ Standard output
в”Ӯ  в”ңв”Җ Expected
в”Ӯ  в”Ӯ  в•ӯ
в”Ӯ  в”Ӯ  в”Ӯ 1 в”Ӯ STDOUT
в”Ӯ  в”Ӯ  в•°
в”Ӯ  в”ңв”Җ Got
в”Ӯ  в”Ӯ  в•ӯ
в”Ӯ  в”Ӯ  в”Ӯ 1 в”Ӯ Hello world
в”Ӯ  в”Ӯ  в•°
в”Ӯ  в””в”Җ Diff
в”Ӯ     в•ӯ
в”Ӯ     в”Ӯ 1   в”Ӯ -STDOUT
в”Ӯ     в”Ӯ   1 в”Ӯ +Hello world
в”Ӯ     в•°
в”ңв”Җ Standard error
в”Ӯ  в”ңв”Җ Expected
в”Ӯ  в”Ӯ  в•ӯ
в”Ӯ  в”Ӯ  в”Ӯ 1 в”Ӯ STDERR
в”Ӯ  в”Ӯ  в•°
в”Ӯ  в”ңв”Җ Got
в”Ӯ  в”Ӯ  в•ӯ
в”Ӯ  в”Ӯ  в”Ӯ 1 в”Ӯ
в”Ӯ  в”Ӯ  в•°
в”Ӯ  в””в”Җ Diff
в”Ӯ     в•ӯ
в”Ӯ     в”Ӯ 1   в”Ӯ -STDERR
в”Ӯ     в•°
в””в”Җ Exit code
   в”ңв”Җ Expected
   в”Ӯ  в””в”Җ 42
   в””в”Җ Got
      в””в”Җ 0

Test result: FAIL (0 passed, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1


[tests.tap_passing]
program_arguments = [
  "test",
  "--output-format",
  "tap",
  "helpers/passing_test.toml",
]
expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/passing_test.toml
"""
expected_stderr = ""
expected_exit_code = 0


[tests.tap_failing]
program_arguments = [
  "test",
  "--output-format",
  "tap",
  "helpers/failing_test.toml",
]
expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/failing_test.toml
  ---
  exit-code:
    expected: 42
    got: 0
  stderr:
    expected: STDERR
    got: ''
  stdout:
    expected: STDOUT
    got: Hello world
  ...
"""
expected_stderr = ""
expected_exit_code = 1


[tests.summary_failing_with_newline]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/failing_test_newline.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
F

вңҳ helpers/failing_test_newline.toml
в””в”Җ Standard output
   в”ңв”Җ Expected
   в”Ӯ  в•ӯ
   в”Ӯ  в”Ӯ 1 в”Ӯ Hello world
   в”Ӯ  в”Ӯ 2 в”Ӯ
   в”Ӯ  в•°
   в”ңв”Җ Got
   в”Ӯ  в•ӯ
   в”Ӯ  в”Ӯ 1 в”Ӯ Hello
   в”Ӯ  в”Ӯ 2 в”Ӯ
   в”Ӯ  в•°
   в””в”Җ Diff
      в•ӯ
      в”Ӯ 1   в”Ӯ -Hello world
      в”Ӯ   1 в”Ӯ +Hello
      в”Ӯ 2 2 в”Ӯ
      в•°

Test result: FAIL (0 passed, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1


[tests.unknown]
program_arguments = [
  "test",
  "--output-format",
  "UNKNOWN",
  "helpers/passing_test.toml",
]
expected_stdout = ""
expected_stderr = """
error: invalid value 'UNKNOWN' for '--output-format <OUTPUT_FORMAT>': Invalid output format

For more information, try '--help'.
"""
expected_exit_code = 2
