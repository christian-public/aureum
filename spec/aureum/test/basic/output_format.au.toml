expected_stderr = ""
expected_exit_code = 1


[tests.tap_passing]
program_arguments = [
  "test",
  "--output-format",
  "tap",
  "helpers/passing_test.toml",
]
expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/passing_test.toml
"""
expected_stderr = ""
expected_exit_code = 0


[tests.tap_failing]
program_arguments = [
  "test",
  "--output-format",
  "tap",
  "helpers/failing_test.toml",
]
expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/failing_test.toml
  ---
  exit-code:
    expected: 42
    got: 0
  stderr:
    expected: STDERR
    got: ''
  stdout:
    expected: STDOUT
    got: Hello world
  ...
"""
expected_stderr = ""
expected_exit_code = 1


[tests.summary_failing_with_newline]
program_arguments = [
  "test",
  "--output-format",
  "summary",
  "helpers/failing_test_newline.toml",
]
expected_stdout = """
рҹҡҖ Running 1 tests:
F

вқҢ helpers/failing_test_newline.toml
в””в”Җв”Җ Standard output
    в”ңв”Җв”Җ Expected
    в”Ӯ   в•ӯ
    в”Ӯ   в”Ӯ 1   в”Ӯ  Hello world
    в”Ӯ   в”Ӯ 2   в”Ӯ
    в”Ӯ   в•°
    в”ңв”Җв”Җ Got
    в”Ӯ   в•ӯ
    в”Ӯ   в”Ӯ   1 в”Ӯ  Hello
    в”Ӯ   в”Ӯ   2 в”Ӯ
    в”Ӯ   в•°
    в””в”Җв”Җ Diff
        в•ӯ
        в”Ӯ 1   в”Ӯ -Hello world
        в”Ӯ   1 в”Ӯ +Hello
        в”Ӯ 2 2 в”Ӯ
        в•°

Test result: FAIL (0 passed, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1


[tests.unknown]
program_arguments = [
  "test",
  "--output-format",
  "UNKNOWN",
  "helpers/passing_test.toml",
]
expected_stdout = ""
expected_stderr = """
error: invalid value 'UNKNOWN' for '--output-format <OUTPUT_FORMAT>': Invalid output format

