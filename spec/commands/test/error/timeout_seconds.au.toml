program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "format_summary"
program_arguments = ["test", "--format", "summary", "helpers/zero_timeout.toml"]

expected_stdout = """
🚀 Running 1 test:
F

❌ helpers/zero_timeout.toml
└── Failed to run test

Test result: FAIL (0 passed, 1 failed)
"""
expected_exit_code = 1


[[tests]]
id = "format_tap"
program_arguments = ["test", "--format", "tap", "helpers/zero_timeout.toml"]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/zero_timeout.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1
