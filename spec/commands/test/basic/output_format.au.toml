[tests.tap_passing]
program_arguments = ["test", "--format", "tap", "helpers/passing_test.toml"]
expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/passing_test.toml
"""
expected_stderr = ""
expected_exit_code = 0


[tests.tap_failing]
program_arguments = ["test", "--format", "tap", "helpers/failing_test.toml"]
expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/failing_test.toml
  ---
  exit-code:
    expected: 42
    got: 0
  stderr:
    expected: STDERR
    got: ''
  stdout:
    expected: STDOUT
    got: Hello world
  ...
"""
expected_stderr = ""
expected_exit_code = 1


[tests.summary_failing_with_newline]
program_arguments = [
  "test",
  "--format",
  "summary",
  "helpers/failing_test_newline.toml",
]
expected_stdout = """
