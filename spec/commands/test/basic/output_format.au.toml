program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "summary_passing"
program_arguments = ["test", "--format", "summary", "helpers/passing_test.toml"]
expected_stdout = """
ЁЯЪА Running 1 test:
.

Test result: OK (1 passed, 0 failed)
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "summary_failing"
program_arguments = ["test", "--format", "summary", "helpers/failing_test.toml"]
expected_stdout = """
ЁЯЪА Running 1 test:
F

тЭМ helpers/failing_test.toml
тФЬтФАтФА Standard output
тФВ   тФЬтФАтФА Expected
тФВ   тФВ   тХн
тФВ   тФВ   тФВ 1   тФВ  STDOUT
тФВ   тФВ   тХ░
тФВ   тФЬтФАтФА Got
тФВ   тФВ   тХн
тФВ   тФВ   тФВ   1 тФВ  Hello world
тФВ   тФВ   тХ░
тФВ   тФФтФАтФА Diff
тФВ       тХн
тФВ       тФВ 1   тФВ -STDOUT
тФВ       тФВ   1 тФВ +Hello world
тФВ       тХ░
тФЬтФАтФА Standard error
тФВ   тФЬтФАтФА Expected
тФВ   тФВ   тХн
тФВ   тФВ   тФВ 1   тФВ  STDERR
тФВ   тФВ   тХ░
тФВ   тФЬтФАтФА Got
тФВ   тФВ   тХн
тФВ   тФВ   тФВ   1 тФВ
тФВ   тФВ   тХ░
тФВ   тФФтФАтФА Diff
тФВ       тХн
тФВ       тФВ 1   тФВ -STDERR
тФВ       тХ░
тФФтФАтФА Exit code
    тФЬтФАтФА Expected
    тФВ   тФФтФАтФА 42
    тФФтФАтФА Got
        тФФтФАтФА 0

Test result: FAIL (0 passed, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1


[[tests]]
id = "tap_passing"
program_arguments = ["test", "--format", "tap", "helpers/passing_test.toml"]
expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/passing_test.toml
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "tap_failing"
program_arguments = ["test", "--format", "tap", "helpers/failing_test.toml"]
expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/failing_test.toml
  ---
  exit-code:
    expected: 42
    got: 0
  stderr:
    expected: STDERR
    got: ''
  stdout:
    expected: STDOUT
    got: Hello world
  ...
"""
expected_stderr = ""
expected_exit_code = 1


[[tests]]
id = "summary_failing_with_newline"
program_arguments = [
  "test",
  "--format",
  "summary",
  "helpers/failing_test_newline.toml",
]
expected_stdout = """
ЁЯЪА Running 1 test:
F

тЭМ helpers/failing_test_newline.toml
тФФтФАтФА Standard output
    тФЬтФАтФА Expected
    тФВ   тХн
    тФВ   тФВ 1   тФВ  Hello world
    тФВ   тФВ 2   тФВ
    тФВ   тХ░
    тФЬтФАтФА Got
    тФВ   тХн
    тФВ   тФВ   1 тФВ  Hello
    тФВ   тФВ   2 тФВ
    тФВ   тХ░
    тФФтФАтФА Diff
        тХн
        тФВ 1   тФВ -Hello world
        тФВ   1 тФВ +Hello
        тФВ 2 2 тФВ
        тХ░

Test result: FAIL (0 passed, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1


[[tests]]
id = "unknown"
program_arguments = ["test", "--format", "UNKNOWN", "helpers/passing_test.toml"]
expected_stdout = ""
expected_stderr = """
error: invalid value 'UNKNOWN' for '--format <FORMAT>': Invalid output format

For more information, try '--help'.
"""
expected_exit_code = 2
