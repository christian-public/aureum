program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "format_summary.timeout_seconds_field"
program_arguments = [
  "test",
  "--format",
  "summary",
  "helpers/non_terminating_with_timeout.toml",
]

expected_stdout = """
🚀 Running 1 test:
F

❌ helpers/non_terminating_with_timeout.toml
└── Failed to run test

Test result: FAIL (0 passed, 1 failed)
"""
expected_exit_code = 1


[[tests]]
id = "format_summary.default_timeout_option"
program_arguments = [
  "test",
  "--format",
  "summary",
  "--default-timeout",
  "0",
  "helpers/non_terminating.toml",
]

expected_stdout = """
🚀 Running 1 test:
F

❌ helpers/non_terminating.toml
└── Failed to run test

Test result: FAIL (0 passed, 1 failed)
"""
expected_exit_code = 1


[[tests]]
id = "format_tap.timeout_seconds_field"
program_arguments = [
  "test",
  "--format",
  "tap",
  "helpers/non_terminating_with_timeout.toml",
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non_terminating_with_timeout.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1


[[tests]]
id = "format_tap.default_timeout_option"
program_arguments = [
  "test",
  "--format",
  "tap",
  "--default-timeout",
  "0",
  "helpers/non_terminating.toml",
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non_terminating.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1
