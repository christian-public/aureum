program = { env = "AUREUM_TEST_EXEC" }

expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "single_file"
program_arguments = ["test", "helpers/dir1/test1.toml"]
expected_stdout = """
🚀 Running 1 test:
.

Test result: OK (1 passed, 0 failed)
"""


[[tests]]
id = "single_dir"
program_arguments = ["test", "helpers/dir1/*.toml"]
expected_stdout = """
🚀 Running 2 tests:
..

Test result: OK (2 passed, 0 failed)
"""


[[tests]]
id = "multiple_dirs"
program_arguments = [
  "test",
  "helpers/dir1/*.toml",
  "helpers/dir2/*.toml",
  "helpers/dir1/*.toml", # This argument is redundant, but it tests that the paths are deduplicated.
]
expected_stdout = """
🚀 Running 4 tests:
....

Test result: OK (4 passed, 0 failed)
"""


[[tests]]
id = "multiple_files"
program_arguments = [
  "test",
  "helpers/dir1/test1.toml",
  "helpers/dir1/test2.toml",
]
expected_stdout = """
🚀 Running 2 tests:
..

Test result: OK (2 passed, 0 failed)
"""
