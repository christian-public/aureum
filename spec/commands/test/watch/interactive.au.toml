program = { env = "AUREUM_TEST_EXEC" }


# The initial idle screen is shown after the first test run completes.
[[tests]]
id = "initial_frame"
program_arguments = [
  "test",
  "--watch",
  "--record",
  "100x20",
  "helpers/failing_stdout_only.toml",
]
stdin = "q\n"

expected_stdout = { file = "snapshots/initial_frame.txt" }
expected_exit_code = 1


# "file-change" in the input stream simulates a watcher event, triggering a re-run.
# A --- separator appears between the two idle screens.
[[tests]]
id = "file_change_reruns_tests"
program_arguments = [
  "test",
  "--watch",
  "--record",
  "100x20",
  "helpers/failing_stdout_only.toml",
]
stdin = "file-change\nq\n"

expected_stdout = { file = "snapshots/file_change_reruns_tests.txt" }
expected_exit_code = 1


# Pressing r opens the diff review; Esc returns to the idle screen.
[[tests]]
id = "review_and_back_to_idle"
program_arguments = [
  "test",
  "--watch",
  "--record",
  "100x20",
  "helpers/failing_stdout_only.toml",
]
stdin = "r\nesc\nq\n"

expected_stdout = { file = "snapshots/review_and_back_to_idle.txt" }
expected_exit_code = 1


# Pressing t manually triggers a re-run without waiting for a file change.
[[tests]]
id = "t_reruns_tests"
program_arguments = [
  "test",
  "--watch",
  "--record",
  "100x20",
  "helpers/failing_stdout_only.toml",
]
stdin = "t\nq\n"

expected_stdout = { file = "snapshots/t_rerun_tests.txt" }
expected_exit_code = 1


# From diff view, pressing l opens the list; Esc cancels the selection and returns to the diff view.
[[tests]]
id = "list_esc_returns_to_diff"
program_arguments = [
  "test",
  "--watch",
  "--record",
  "100x20",
  "helpers/failing_stdout_only.toml",
]
stdin = "r\nl\nesc\nq\n"

expected_stdout = { file = "snapshots/list_esc_to_diff.txt" }
expected_exit_code = 1
