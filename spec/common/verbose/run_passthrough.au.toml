program = { env = "AUREUM_TEST_EXEC" }


[tests.without_verbose]
program_arguments = ["run", "--output-format", "passthrough", "helpers/*.toml"]
expected_stdout = """
"""
expected_stderr = """
📋 helpers/many_requirements.toml
├── :env_var_exists
├── :env_var_missing
│   └── Validation errors
│       └── ✘ Missing environment variable 'AUREUM_TEST_ENV_VAR_DOES_NOT_EXIST'
├── :external_file_exists
└── :external_file_missing
    └── Validation errors
        └── ✘ Missing external file 'aureum_test_this_file_does_not_exist'

warning: Some config files contain errors (See above)
"""
expected_exit_code = 3


[tests.with_verbose]
program_arguments = [
    "run",
    "--output-format",
    "passthrough",
    "--verbose",
    "--hide-absolute-paths",
    "helpers/*.toml",
]
expected_stdout = ""
expected_stderr = """
error: `--verbose` is not supported in passthrough mode
hint: You may want to use `--output-format toml` instead
"""
expected_exit_code = 2
