program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "without_verbose"
program_arguments = ["test", "--format", "tap", "helpers/*.toml"]
expected_stdout = """
TAP version 14
1..3
ok     1 - helpers/many_requirements.toml:env_var_exists
ok     2 - helpers/many_requirements.toml:external_file_exists
ok     3 - helpers/no_requirements.toml
"""
expected_stderr = """
📋 helpers/many_requirements.toml
├── Watch file errors
│   ├── ✘ Missing external file `AUREUM_TEST_FILE_WITH_PATH_TO_WATCH_DOES_NOT_EXIST`
│   └── ✘ Missing environment variable `AUREUM_TEST_ENV_VAR_WITH_PATH_TO_WATCH_DOES_NOT_EXIST`
├── :env_var_exists
├── :env_var_missing
│   └── Validation errors
│       └── ✘ Missing environment variable `AUREUM_TEST_ENV_VAR_DOES_NOT_EXIST`
├── :external_file_exists
└── :external_file_missing
    └── Validation errors
        └── ✘ Missing external file `aureum_test_this_file_does_not_exist`

warning: Some config files contain errors (See above)
"""
expected_exit_code = 3


[[tests]]
id = "with_verbose"
program_arguments = [
    "test",
    "--format",
    "tap",
    "--verbose",
    "--hide-absolute-paths",
    "helpers/*.toml",
]
expected_stdout = """
TAP version 14
1..3
ok     1 - helpers/many_requirements.toml:env_var_exists
ok     2 - helpers/many_requirements.toml:external_file_exists
ok     3 - helpers/no_requirements.toml
