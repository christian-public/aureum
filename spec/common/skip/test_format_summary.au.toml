[[tests]]
id = "all"
program_arguments = ["test", "--format", "summary", "helpers/*.toml"]

expected_stdout = """
🚀 Running 5 tests:
Fss.s

❌ helpers/failing_test.toml
└── Standard output
    ├── Expected
    │   ╭
    │   │ 1   │  expected
    │   ╰
    ├── Got
    │   ╭
    │   │   1 │  actual
    │   ╰
    └── Diff
        ╭
        │ 1   │ -expected
        │   1 │ +actual
        ╰

Test result: FAIL (1 passed, 3 skipped, 1 failed)
"""
expected_stderr = ""
expected_exit_code = 1
