id = "skip_root_test"
program_arguments = [
    "test",
    "--format",
    "summary",
    "helpers/skip_root_test.toml",
]

expected_stdout = """
🚀 Running 1 test:
s

Test result: OK (0 passed, 1 skipped)
"""
