program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "skip_root_test"
program_arguments = [
    "test",
    "--verbose",
    "--stable-output",
    "helpers/skip_root_test.toml",
]

expected_stdout = """
🚀 Running 0 of 1 test:
s

⊘ helpers/skip_root_test.toml  not implemented yet

Test result: OK (0 passed, 1 skipped)
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/skip_root_test.toml

📋 helpers/skip_root_test.toml
└── Test
    └── Program to run
        └── ✔ <absolute path to 'echo'>

"""
expected_exit_code = 0


[[tests]]
id = "skip_subtest"
program_arguments = [
    "test",
    "--verbose",
    "--stable-output",
    "helpers/skip_subtest.toml",
]

expected_stdout = """
🚀 Running 1 of 2 tests:
.s

⊘ helpers/skip_subtest.toml:not_ready  feature not ready

✔ helpers/skip_subtest.toml:passing

Test result: OK (1 passed, 1 skipped)
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/skip_subtest.toml

📋 helpers/skip_subtest.toml
├── :passing
│   └── Program to run
│       └── ✔ <absolute path to 'echo'>
└── :not_ready
    └── Program to run
        └── ✔ <absolute path to 'echo'>

"""
expected_exit_code = 0


[[tests]]
id = "skip_invalid_config"
program_arguments = [
    "test",
    "--verbose",
    "--stable-output",
    "helpers/skip_invalid_config.toml",
]

expected_stdout = """
🚀 Running 0 of 1 test:
s

⊘ helpers/skip_invalid_config.toml  todo

Test result: OK (0 passed, 1 skipped)
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/skip_invalid_config.toml

📋 helpers/skip_invalid_config.toml
└── Test
    └── Program to run
        └── ✘ Not specified

"""
expected_exit_code = 0


[[tests]]
id = "all"
program_arguments = ["test", "--verbose", "--stable-output", "helpers/*.toml"]

expected_stdout = """
🚀 Running 2 of 5 tests:
Fss.s

⊘ helpers/skip_invalid_config.toml     todo
⊘ helpers/skip_root_test.toml          not implemented yet
⊘ helpers/skip_subtest.toml:not_ready  feature not ready

✔ helpers/skip_subtest.toml:passing

❌ helpers/failing_test.toml
└── Standard output
    ├── Expected
    │   ╭
    │   │ 1   │  expected
    │   ╰
    ├── Got
    │   ╭
    │   │   1 │  actual
    │   ╰
    └── Diff
        ╭
        │ 1   │ -expected
        │   1 │ +actual
        ╰

Test result: FAIL (1 failed, 1 passed, 3 skipped)
"""
expected_stderr = """
🔍 Found 4 config files
├── helpers/failing_test.toml
├── helpers/skip_invalid_config.toml
├── helpers/skip_root_test.toml
└── helpers/skip_subtest.toml

📋 helpers/failing_test.toml
└── Test
    └── Program to run
        └── ✔ <absolute path to 'echo'>

📋 helpers/skip_invalid_config.toml
└── Test
    └── Program to run
        └── ✘ Not specified

📋 helpers/skip_root_test.toml
└── Test
    └── Program to run
        └── ✔ <absolute path to 'echo'>

📋 helpers/skip_subtest.toml
├── :passing
│   └── Program to run
│       └── ✔ <absolute path to 'echo'>
└── :not_ready
    └── Program to run
        └── ✔ <absolute path to 'echo'>

"""
expected_exit_code = 1
