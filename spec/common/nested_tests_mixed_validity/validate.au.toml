program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "all_valid.all"
program_arguments = ["validate", "helpers/all_valid.toml"]

expected_stdout = """
✔ helpers/all_valid.toml  2 tests
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "all_valid.specific_test_id"
program_arguments = ["validate", "helpers/all_valid.toml:test1"]

expected_stdout = """
✔ helpers/all_valid.toml  2 tests
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "missing_program_on_test2.all"
program_arguments = ["validate", "helpers/missing_program_on_test2.toml"]

expected_stdout = """
✘ helpers/missing_program_on_test2.toml  2 tests
"""
expected_stderr = """
📋 helpers/missing_program_on_test2.toml
├── :test1
└── :test2
    └── Validation errors
        └── ✘ The field `program` is required

warning: Some config files contain errors (See above)
"""
expected_exit_code = 3


