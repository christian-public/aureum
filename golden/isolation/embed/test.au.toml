program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "basic"
program_arguments = [
    "test",
    "--format=summary",
    "--stable-output",
    { path_of_file = "helpers/embed-basic.toml" },
]

expected_stdout = """
🚀 Running 1 test:
.

Test result: OK (1 passed) — Finished in 0.0s
"""
expected_stderr = ""
expected_exit_code = 0


