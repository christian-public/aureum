input_files = ["helpers"]
program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "all-valid.all"
program_arguments = ["test", "--format", "tap", "helpers/all-valid.toml"]

expected_stdout = """
TAP version 14
1..2
ok     1 - helpers/all-valid.toml:test1
ok     2 - helpers/all-valid.toml:test2
"""
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "all-valid.specific-test-id"
