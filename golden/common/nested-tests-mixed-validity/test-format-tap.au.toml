expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/all-valid.toml:test1
"""
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "missing-program-on-test2.all"
program_arguments = [
    "test",
    "--format",
    "tap",
    "helpers/missing-program-on-test2.toml",
]

expected_stdout = """
TAP version 14
1..1
ok     1 - helpers/missing-program-on-test2.toml:test1
"""
expected_stderr = """
📋 helpers/missing-program-on-test2.toml
├── :test1
└── :test2
    └── Validation errors
        └── ✘ missing required field `program`

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


