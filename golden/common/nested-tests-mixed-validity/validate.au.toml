program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "all_valid.all"
program_arguments = ["validate", "helpers/all-valid.toml"]

expected_stdout = """
✔ helpers/all-valid.toml  2 tests
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "all_valid.specific_test_id"
program_arguments = ["validate", "helpers/all-valid.toml:test1"]

expected_stdout = """
✔ helpers/all-valid.toml  2 tests
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "missing_program_on_test2.all"
program_arguments = ["validate", "helpers/missing-program-on-test2.toml"]

expected_stdout = """
✘ helpers/missing-program-on-test2.toml  2 tests
"""
expected_stderr = """
📋 helpers/missing-program-on-test2.toml
├── :test1
└── :test2
    └── Validation errors
        └── ✘ missing required field `program`

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


