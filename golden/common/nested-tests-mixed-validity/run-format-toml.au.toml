program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "all-valid.all"
program_arguments = ["run", "--format", "toml", "helpers/all-valid.toml"]

expected_stdout = """
# TEST: helpers/all-valid.toml:test1
expected_stdout = "Test 1"
expected_stderr = ""
expected_exit_code = 0

# TEST: helpers/all-valid.toml:test2
expected_stdout = "Test 2"
expected_stderr = ""
expected_exit_code = 0
"""
expected_stderr = ""
expected_exit_code = 0


