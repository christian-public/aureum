input_files = ["helpers"]
program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "all-valid.all"
program_arguments = ["list", "--tree", "helpers/all-valid.toml"]

expected_stdout = """
/
└── helpers/
    └── all-valid.toml
        ├── :test1
        └── :test2
"""
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "all-valid.specific-test-id"
program_arguments = ["list", "--tree", "helpers/all-valid.toml:test1"]

expected_stdout = """
/
└── helpers/
    └── all-valid.toml
        └── :test1
"""
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "missing-program-on-test2.all"
program_arguments = ["list", "--tree", "helpers/missing-program-on-test2.toml"]

expected_stdout = """
/
└── helpers/
    └── missing-program-on-test2.toml
        ├── :test1
        └── :test2
"""
expected_stderr = """
📋 helpers/missing-program-on-test2.toml
├── :test1
└── :test2
    └── Validation errors
        └── ✘ missing required field `program`

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


[[test]]
id = "missing-program-on-test2.specific-test-id"
program_arguments = [
    "list",
    "--tree",
    "helpers/missing-program-on-test2.toml:test1",
]

