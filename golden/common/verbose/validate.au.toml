input_files = ["helpers"]
program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "without-verbose"
program_arguments = ["validate", "helpers/*.toml"]

expected_stdout = """
✘ helpers/many-requirements.toml  4 tests
✔ helpers/no-requirements.toml    1 test
"""
expected_stderr = """
📋 helpers/many-requirements.toml
├── Watch file errors
│   ├── ✘ missing external file `AUREUM_TEST_FILE_WITH_PATH_TO_WATCH_DOES_NOT_EXIST`
│   └── ✘ missing environment variable `AUREUM_TEST_ENV_VAR_WITH_PATH_TO_WATCH_DOES_NOT_EXIST`
├── :env-var-exists
├── :env-var-missing
│   └── Validation errors
│       └── ✘ field `expected_stdout`: missing environment variable `AUREUM_TEST_ENV_VAR_DOES_NOT_EXIST`
├── :external-file-exists
└── :external-file-missing
    └── Validation errors
        └── ✘ field `expected_stdout`: missing external file `aureum_test_this_file_does_not_exist`

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


[[test]]
id = "with-verbose"
program_arguments = [
    "validate",
    "--verbose",
    "--stable-output",
    "helpers/*.toml",
]

expected_stdout = """
