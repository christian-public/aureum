[[test]]
id = "all"
input_files = ["helpers"]
program_arguments = [
    "test",
    "--format",
    "summary",
    "--stable-output",
    "helpers/*.toml",
]

expected_stdout = """
🚀 Running 2 of 6 tests:
Fss.ss

✘ helpers/failing-test.toml
└── Standard output
    ├── Expected
    │   ╭
    │   │ 1   │  expected
    │   ╰
    ├── Got
    │   ╭
    │   │   1 │  actual
    │   ╰
    └── Diff
        ╭
        │ 1   │ -expected
        │   1 │ +actual
        ╰

Test result: FAIL (1 failed, 1 passed, 4 skipped, 1 config error) — Finished in 0.0s
"""
expected_stderr = """
📋 helpers/validation-error-with-skipped.toml
├── :skipped
│   └── ⊘ Skipped: todo
└── :invalid
    └── Validation errors
        └── ✘ no expectations defined; specify at least one `expected_*` field: `expected_stdout`, `expected_stderr`, or `expected_exit_code`

warning: some config files contain errors (see above)
"""
expected_exit_code = 1
