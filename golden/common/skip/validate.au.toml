program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "skip-root-test"
program_arguments = ["validate", "helpers/skip-root-test.toml"]

expected_stdout = """
✔ helpers/skip-root-test.toml  1 test  1 skipped  → no runnable tests
"""
