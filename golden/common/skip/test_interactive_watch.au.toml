program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "skip_root_test"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "--watch",
    "helpers/skip_root_test.toml",
]

expected_stdout = { file = "snapshots/skip_root_test.txt" }
expected_stderr = ""
expected_exit_code = 0


