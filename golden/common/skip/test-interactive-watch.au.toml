program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "skip-root-test"
program_arguments = [
    "test",
    "--record=100x20",
    "--watch",
    { path_of_file = "helpers/skip-root-test.toml" },
]

expected_stdout = { from_file = "snapshots/skip-root-test.txt" }
expected_stderr = ""
expected_exit_code = 0


