[[test]]
id = "all"
input_files = ["helpers"]
program_arguments = ["test", "--record=100x20", "--watch", "helpers/*.toml"]
stdin = "f\nl\nq\n"

expected_stdout = { from_file = "snapshots/all.txt" }
expected_stderr = ""
expected_exit_code = 1
