[[test]]
id = "all"
program_arguments = ["test", "--format", "tap", "helpers/*.toml"]

expected_stdout = """
TAP version 14
1..6
not ok 1 - helpers/failing-test.toml
  ---
  stdout:
    expected: expected
    got: actual
  ...
ok     2 - helpers/skip-invalid-config.toml # SKIP todo
ok     3 - helpers/skip-root-test.toml # SKIP not implemented yet
ok     4 - helpers/skip-subtest.toml:passing
ok     5 - helpers/skip-subtest.toml:not-ready # SKIP feature not ready
ok     6 - helpers/validation-error-with-skipped.toml:skipped # SKIP todo
"""
expected_stderr = """
📋 helpers/validation-error-with-skipped.toml
├── :skipped
│   └── ⊘ Skipped: todo
└── :invalid
    └── Validation errors
        └── ✘ no expectations defined; specify at least one `expected_*` field: `expected_stdout`, `expected_stderr`, or `expected_exit_code`

warning: some config files contain errors (see above)
"""
expected_exit_code = 1
