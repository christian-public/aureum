program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "skip-root-test"
program_arguments = [
    "test",
    "--verbose",
    "--stable-output",
    "helpers/skip-root-test.toml",
]

expected_stdout = """
🚀 Running 0 of 1 test:
s

⊘ helpers/skip-root-test.toml  not implemented yet

Test result: OK (0 passed, 1 skipped) — Finished in 0.0s
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/skip-root-test.toml

📋 helpers/skip-root-test.toml
└── Test
    └── ⊘ Skipped: not implemented yet

"""
expected_exit_code = 0


