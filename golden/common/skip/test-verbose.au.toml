✔ helpers/skip-subtest.toml:passing

Test result: OK (1 passed, 1 skipped) — Finished in 0.0s
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/skip-subtest.toml

📋 helpers/skip-subtest.toml
├── :passing
│   └── Program to run
│       └── ✔ <absolute path to 'echo'>
└── :not-ready
    └── ⊘ Skipped: feature not ready

"""
expected_exit_code = 0


