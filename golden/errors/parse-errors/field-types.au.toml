program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "wrong-field-types"
program_arguments = ["validate", "helpers/wrong-field-types.toml"]

expected_stdout = """
✘ helpers/wrong-field-types.toml  Parse error
"""
expected_stderr = """
📋 helpers/wrong-field-types.toml
└── Parse errors
    ├── ✘ field `program`: expected string, got boolean
    ├── ✘ field `program_arguments`: expected array, got string
    └── ✘ field `expected_exit_code`: expected integer, got string

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


