program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "missing-id"
program_arguments = ["validate", "helpers/missing-id.toml"]

expected_stdout = """
✘ helpers/missing-id.toml  Parse error
"""
expected_stderr = """
📋 helpers/missing-id.toml
└── Parse errors
    └── ✘ line 4: [[tests]] #1: missing required field `id`

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


[[tests]]
id = "invalid-id"
program_arguments = ["validate", "helpers/invalid-id.toml"]

expected_stdout = """
✘ helpers/invalid-id.toml  Parse error
"""
expected_stderr = """
📋 helpers/invalid-id.toml
└── Parse errors
    ├── ✘ line 12: [[tests]] #2: field `id`: invalid identifier `invalid id!` (allowed: ASCII letters, digits, `_`, `-`; separate nested ids with `.`)
    └── ✘ line 19: [[tests]] #3: field `id`: invalid identifier `` (must be non-empty)

warning: some config files contain errors (see above)
"""
expected_exit_code = 3


