program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "singleline"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    "helpers/echo-hello.toml",
]

expected_stdout = "Hello world"
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "multiline"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    "helpers/echo-multiline.toml",
]

expected_stdout = """
Hello world
"""
expected_stderr = ""
expected_exit_code = 0


[[tests]]
id = "stderr_and_exit_code"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    "helpers/bash-stderr-and-exit-code.toml",
]

expected_stdout = ""
expected_stderr = "hello"
expected_exit_code = 42


[[tests]]
id = "stdin"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    "helpers/cat-stdin.toml",
]

expected_stdout = "Hello world"
expected_stderr = ""
expected_exit_code = 0
