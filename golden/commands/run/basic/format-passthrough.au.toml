program = { env = "AUREUM_TEST_EXEC" }


[[test]]
id = "singleline"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    { path_of_file = "helpers/echo-hello.toml" },
]

expected_stdout = "Hello world"
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "multiline"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    { path_of_file = "helpers/echo-multiline.toml" },
]

expected_stdout = """
Hello world
"""
expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "stderr-and-exit-code"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    { path_of_file = "helpers/bash-stderr-and-exit-code.toml" },
]

expected_stdout = ""
expected_stderr = "hello"
expected_exit_code = 42


[[test]]
id = "stdin"
program_arguments = [
    "run",
    "--format",
    "passthrough",
    { path_of_file = "helpers/cat-stdin.toml" },
]

expected_stdout = "Hello world"
expected_stderr = ""
expected_exit_code = 0
