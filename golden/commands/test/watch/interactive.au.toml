program = { from_env = "AUREUM_TEST_EXEC" }


# The initial idle screen is shown after the first test run completes.
[[test]]
id = "initial-frame"
program_arguments = [
  "test",
  "--watch",
  "--record=100x20",
  { path_of_file = "helpers/failing-stdout-only.toml" },
]
stdin = "q\n"

expected_stdout = { from_file = "snapshots/initial-frame.txt" }
expected_exit_code = 1


# "file-change" in the input stream simulates a watcher event, triggering a re-run.
# A --- separator appears between the two idle screens.
[[test]]
id = "file-change-reruns-tests"
program_arguments = [
  "test",
  "--watch",
  "--record=100x20",
  { path_of_file = "helpers/failing-stdout-only.toml" },
]
stdin = "file-change\nq\n"

expected_stdout = { from_file = "snapshots/file-change-reruns-tests.txt" }
expected_exit_code = 1


# Pressing f opens the diff review; Esc returns to the idle screen.
[[test]]
id = "review-and-back-to-idle"
program_arguments = [
  "test",
  "--watch",
  "--record=100x20",
  { path_of_file = "helpers/failing-stdout-only.toml" },
]
stdin = "f\nesc\nq\n"

expected_stdout = { from_file = "snapshots/review-and-back-to-idle.txt" }
expected_exit_code = 1


# Pressing r manually triggers a re-run without waiting for a file change.
[[test]]
id = "r-reruns-tests"
program_arguments = [
  "test",
  "--watch",
  "--record=100x20",
  { path_of_file = "helpers/failing-stdout-only.toml" },
]
stdin = "r\nq\n"

expected_stdout = { from_file = "snapshots/t-rerun-tests.txt" }
expected_exit_code = 1


# From diff view, pressing l opens the list; Esc cancels the selection and returns to the diff view.
[[test]]
id = "list-esc-returns-to-diff"
program_arguments = [
  "test",
  "--watch",
  "--record=100x20",
  { path_of_file = "helpers/failing-stdout-only.toml" },
]
stdin = "f\nl\nesc\nq\n"

expected_stdout = { from_file = "snapshots/list-esc-to-diff.txt" }
expected_exit_code = 1
