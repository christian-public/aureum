program = { env = "AUREUM_TEST_EXEC" }


[[test]]
id = "startup-message"
program_arguments = ["test", "--watch", "--stable-output", "helpers/passing.toml"]

expected_stdout = """
🚀 Running 1 test:
.

Test result: OK (1 passed) — Finished in 0.0s
"""
expected_stderr = """
watch: watching 2 paths for changes...
"""
expected_exit_code = 0


[[test]]
id = "file-change-reruns-tests"
program_arguments = ["test", "--watch", "--stable-output", "helpers/passing.toml"]
stdin = "file-change\n"

expected_stdout = """
🚀 Running 1 test:
.

Test result: OK (1 passed) — Finished in 0.0s
🚀 Running 1 test:
.

Test result: OK (1 passed) — Finished in 0.0s
"""
expected_stderr = """
watch: watching 2 paths for changes...

watch: changes detected
"""
expected_exit_code = 0


[[test]]
id = "verbose"
program_arguments = [
    "test",
    "--watch",
    "--verbose",
    "--stable-output",
    "helpers/passing.toml",
]

expected_stdout = """
🚀 Running 1 test:
.

✔ helpers/passing.toml

Test result: OK (1 passed) — Finished in 0.0s
"""
expected_stderr = """
🔍 Found 1 config files
└── helpers/passing.toml

👁 Watching 2 paths
├── <absolute path to 'echo'>
└── helpers/passing.toml

📋 helpers/passing.toml
└── Test
    └── Program to run
        └── ✔ <absolute path to 'echo'>

watch: watching 2 paths for changes...
"""
expected_exit_code = 0
