program = { env = "AUREUM_TEST_EXEC" }


# Status area starts empty: no message shown when on a failing field that is undecided.
[[tests]]
id = "empty-when-on-failing-undecided-field"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "q\n"

expected_stdout = { file = "snapshots/status-empty.txt" }
expected_exit_code = 1


# Switching to a non-failing output field (stderr is NotChecked) shows the navigation hint.
[[tests]]
id = "non-failing-output-field"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "e\nq\n"

expected_stdout = { file = "snapshots/status-non-failing-field.txt" }
expected_exit_code = 1


# Switching to stdin shows the same navigation hint.
[[tests]]
id = "stdin-field"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "i\nq\n"

expected_stdout = { file = "snapshots/status-stdin-field.txt" }
expected_exit_code = 1


# Pressing Enter on a failing field without a decision shows the error message.
[[tests]]
id = "enter-on-undecided-failing-field"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "enter\nq\n"

expected_stdout = { file = "snapshots/status-enter-undecided.txt" }
expected_exit_code = 1


# With a pending decision that would resolve all fields, shows "go to the next test."
[[tests]]
id = "pending-decision-last-field"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "a\nq\n"

expected_stdout = { file = "snapshots/status-all-decided.txt" }
expected_exit_code = 1


# With a pending decision but other fields still undecided, shows "go to the next field."
[[tests]]
id = "pending-decision-more-fields-remain"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-and-exit-code.toml",
]
stdin = "a\nq\n"

expected_stdout = { file = "snapshots/status-pending-next-field.txt" }
expected_exit_code = 1


# Pressing a then navigating to another field reverts the pending decision.
[[tests]]
id = "pending-decision-reverts-on-navigate"
program_arguments = [
    "test",
    "--record",
    "120x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "a\ne\nq\n"

expected_stdout = { file = "snapshots/status-pending-reverts.txt" }
expected_exit_code = 1
