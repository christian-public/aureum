    "--record",
    "100x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "s\nd\nq\n"

expected_stdout = { file = "snapshots/record-skip-then-unbound.txt" }
expected_exit_code = 1


# Pressing p after advancing to the second test goes back to the first and restores its decision.
[[tests]]
id = "go-back-restores-decision"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/two-failing-stdout-tests.toml",
]
stdin = "s\nenter\np\nq\n"

expected_stdout = { file = "snapshots/record-go-back-restores-decision.txt" }
