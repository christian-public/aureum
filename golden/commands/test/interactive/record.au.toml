stdin = "down\ndown\ndown\nup\nq\n"

expected_stdout = { file = "snapshots/record-scroll-up-after-excess-down.txt" }
expected_exit_code = 1


# Pressing Esc in the list returns to the previously viewed test, ignoring any navigation done in the list.
[[tests]]
id = "list-esc-goes-back"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/two-failing-stdout-tests.toml",
]
stdin = "l\ndown\nesc\nq\n"

expected_stdout = { file = "snapshots/record-list-esc-goes-back.txt" }
expected_exit_code = 1


# Pressing p mid-way through a multi-field test preserves the decisions made so far.
[[tests]]
