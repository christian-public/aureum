program = { env = "AUREUM_TEST_EXEC" }


# The initial TUI frame is emitted when using --record (no leading --- separator).
[[tests]]
id = "initial-frame"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "q\n"

expected_stdout = { file = "snapshots/record-initial-frame.txt" }
expected_exit_code = 1


# Arguments containing spaces are single-quoted so the command can be pasted into a terminal.
[[tests]]
id = "spaced-arg-is-quoted"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-stdout-spaced-arg.toml",
]
stdin = "q\n"

expected_stdout = { file = "snapshots/record-spaced-arg.txt" }
expected_exit_code = 1


# Pressing a navigation key emits a --- separator followed by the new frame.
[[tests]]
id = "key-press-emits-separator"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "1\nq\n"

expected_stdout = { file = "snapshots/record-tab-switch-to-expected.txt" }
expected_exit_code = 1


# On an unconfigured field, pressing [1] Expected and [3] Diff in sequence are both no-ops.
[[tests]]
id = "not-checked-field-view-switch-disabled"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-stdout-only.toml",
]
stdin = "e\n1\n3\nq\n"

expected_stdout = { file = "snapshots/record-stderr-not-checked-view-switch-disabled.txt" }
expected_exit_code = 1


# Pressing i switches to the stdin view, showing line numbers on the right (like Got view).
[[tests]]
id = "stdin-view"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-cat-with-stdin.toml",
]
stdin = "i\nq\n"

expected_stdout = { file = "snapshots/record-stdin-view.txt" }
expected_exit_code = 1


# When two fields fail, Enter after deciding the first auto-navigates to the second undecided field.
[[tests]]
id = "multi-field-navigation"
program_arguments = [
    "test",
    "--record",
    "100x20",
    "helpers/failing-stdout-and-exit-code.toml",
]
stdin = "s\nenter\ns\nenter\nq\n"

expected_stdout = { file = "snapshots/record-multi-field-navigation.txt" }
expected_exit_code = 1


