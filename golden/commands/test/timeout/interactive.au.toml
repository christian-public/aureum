program = { from_env = "AUREUM_TEST_EXEC" }


[[test]]
id = "timeout-seconds-field"
program_arguments = [
  "test",
  "--record=100x20",
  { path_of_file = "helpers/non-terminating-with-timeout.toml" },
]
stdin = "l\nq\n"

expected_stdout = { from_file = "snapshots/timeout-seconds-field.txt" }
expected_exit_code = 1


[[test]]
id = "default-timeout-option"
program_arguments = [
  "test",
  "--default-timeout=0",
  "--record=100x20",
  { path_of_file = "helpers/non-terminating.toml" },
]
stdin = "l\nq\n"

expected_stdout = { from_file = "snapshots/default-timeout-option.txt" }
expected_exit_code = 1
