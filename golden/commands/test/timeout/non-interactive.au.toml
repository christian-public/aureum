program = { env = "AUREUM_TEST_EXEC" }


[[test]]
id = "format-summary.timeout-seconds-field"
program_arguments = [
  "test",
  "--format",
  "summary",
  "--stable-output",
  { path_of_file = "helpers/non-terminating-with-timeout.toml" },
]

expected_stdout = """
🚀 Running 1 test:
F

✘ helpers/non-terminating-with-timeout.toml
└── Run error: timed out

Test result: FAIL (1 failed, 0 passed) — Finished in 0.0s
"""
expected_exit_code = 1


[[test]]
id = "format-summary.default-timeout-option"
program_arguments = [
  "test",
  "--format",
  "summary",
  "--default-timeout",
  "0",
  "--stable-output",
  { path_of_file = "helpers/non-terminating.toml" },
]

expected_stdout = """
🚀 Running 1 test:
F

✘ helpers/non-terminating.toml
└── Run error: timed out

Test result: FAIL (1 failed, 0 passed) — Finished in 0.0s
"""
expected_exit_code = 1


[[test]]
id = "format-tap.timeout-seconds-field"
program_arguments = [
  "test",
  "--format",
  "tap",
  { path_of_file = "helpers/non-terminating-with-timeout.toml" },
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non-terminating-with-timeout.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1


[[test]]
id = "format-tap.default-timeout-option"
program_arguments = [
  "test",
  "--format",
  "tap",
  "--default-timeout",
  "0",
  { path_of_file = "helpers/non-terminating.toml" },
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non-terminating.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1
