program = { env = "AUREUM_TEST_EXEC" }


[[tests]]
id = "format_summary.timeout_seconds_field"
program_arguments = [
  "test",
  "--format",
  "summary",
  "--stable-output",
  "helpers/non-terminating-with-timeout.toml",
]

expected_stdout = """
🚀 Running 1 test:
F

✘ helpers/non-terminating-with-timeout.toml
└── Run error: timed out

Test result: FAIL (1 failed, 0 passed) — Finished in 0.0s
"""
expected_exit_code = 1


[[tests]]
id = "format_summary.default_timeout_option"
program_arguments = [
  "test",
  "--format",
  "summary",
  "--default-timeout",
  "0",
  "--stable-output",
  "helpers/non-terminating.toml",
]

expected_stdout = """
🚀 Running 1 test:
F

✘ helpers/non-terminating.toml
└── Run error: timed out

Test result: FAIL (1 failed, 0 passed) — Finished in 0.0s
"""
expected_exit_code = 1


[[tests]]
id = "format_tap.timeout_seconds_field"
program_arguments = [
  "test",
  "--format",
  "tap",
  "helpers/non-terminating-with-timeout.toml",
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non-terminating-with-timeout.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1


[[tests]]
id = "format_tap.default_timeout_option"
program_arguments = [
  "test",
  "--format",
  "tap",
  "--default-timeout",
  "0",
  "helpers/non-terminating.toml",
]

expected_stdout = """
TAP version 14
1..1
not ok 1 - helpers/non-terminating.toml
  ---
  message: timed out
  ...
"""
expected_exit_code = 1
