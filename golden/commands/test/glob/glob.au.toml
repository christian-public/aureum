input_files = ["helpers"]
program = { env = "AUREUM_TEST_EXEC" }

expected_stderr = ""
expected_exit_code = 0


[[test]]
id = "single-file"
program_arguments = ["test", "--stable-output", "helpers/dir1/test1.toml"]

expected_stdout = """
🚀 Running 1 test:
.

Test result: OK (1 passed) — Finished in 0.0s
"""


[[test]]
id = "single-dir"
program_arguments = ["test", "--stable-output", "helpers/dir1/*.toml"]

expected_stdout = """
🚀 Running 2 tests:
..

Test result: OK (2 passed) — Finished in 0.0s
"""


[[test]]
id = "multiple-dirs"
program_arguments = [
  "test",
  "--stable-output",
  "helpers/dir1/*.toml",
  "helpers/dir2/*.toml",
  "helpers/dir1/*.toml", # This argument is redundant, but it tests that the paths are deduplicated.
]

expected_stdout = """
🚀 Running 4 tests:
....

Test result: OK (4 passed) — Finished in 0.0s
"""


[[test]]
id = "multiple-files"
program_arguments = [
  "test",
  "--stable-output",
  "helpers/dir1/test1.toml",
  "helpers/dir1/test2.toml",
]

expected_stdout = """
🚀 Running 2 tests:
..

Test result: OK (2 passed) — Finished in 0.0s
"""
